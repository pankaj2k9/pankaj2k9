  <!-- Right edge binary stream -->
  <g transform="translate(1400, 140)" font-family="'Courier New', monospace" font-size="10" fill="#00D4FF">
    <text y="0" opacity="0.4">01</text>
    <text y="20" opacity="0.3">10</text>
    <text y="40" opacity="0.5">11</text>
    <text y="60" opacity="0.2">01</text>
    <text y="80" opacity="0.4">00</text>
    <text y="100" opacity="0.6">11</text>
    <text y="120" opacity="0.3">10</text>
    <text y="140" opacity="0.4">01</text>
    <text y="160" opacity="0.5">11</text>
    <text y="180" opacity="0.3">00</text>
  </g>

  <!-- Top scanning line -->
  <line x1="440" y1="75" x2="1100" y2="75" stroke="#F75806" stroke-width="1" opacity="0.3"/>
  <circle cx="440" cy="75" r="3" fill="#F75806">
    <animate attributeName="cx" values="440;1100;440" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom accent line -->
  <line x1="440" y1="450" x2="1100" y2="450" stroke="#00D4FF" stroke-width="0.5" opacity="0.25"/>

  <!-- Version tag -->
  <g transform="translate(1380, 465)" font-family="'Courier New', monospace" font-size="10" fill="#64748B">
    <text>v2026.01</text>
