<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pankaj Kumar Pramanik - Data and AI Engineer">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="50%" stop-color="#0a1128"/>
      <stop offset="100%" stop-color="#14142b"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="0.15" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F75806" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#F75806" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F75806" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.9" cy="0.2" r="0.4">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="0.7" cy="0.9" r="0.35">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="#00D4FF" fill-opacity="0.15"/>
    </pattern>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="40%" stop-color="#F75806"/>
      <stop offset="70%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>
  <rect width="1500" height="500" fill="url(#dots)"/>
  <rect width="1500" height="500" fill="url(#glowOrange)"/>
  <rect width="1500" height="500" fill="url(#glowCyan)"/>
  <rect width="1500" height="500" fill="url(#glowPurple)"/>

  <!-- Corner brackets -->
  <g stroke="#F75806" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 30 30 L 30 70 M 30 30 L 70 30"/>
    <path d="M 1470 30 L 1470 70 M 1470 30 L 1430 30"/>
    <path d="M 30 470 L 30 430 M 30 470 L 70 470"/>
    <path d="M 1470 470 L 1470 430 M 1470 470 L 1430 470"/>
  </g>

  <!-- Background code fragments -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00D4FF" fill-opacity="0.12">
    <text x="1100" y="60">{ "role": "ai_engineer" }</text>
    <text x="1150" y="85">import langchain</text>
    <text x="1200" y="460">agent.run()</text>
    <text x="1050" y="445">class RAGPipeline:</text>
    <text x="900" y="70">01001100 01001101</text>
  </g>

  <!-- Neural Network (Left side) -->
  <g transform="translate(120, 145)" filter="url(#neonGlow)">
    <g stroke="#F75806" stroke-width="1" fill="none" opacity="0.35">
      <line x1="0" y1="30" x2="110" y2="0"/>
      <line x1="0" y1="30" x2="110" y2="55"/>
      <line x1="0" y1="30" x2="110" y2="110"/>
      <line x1="0" y1="30" x2="110" y2="165"/>
      <line x1="0" y1="30" x2="110" y2="210"/>
      <line x1="0" y1="105" x2="110" y2="0"/>
      <line x1="0" y1="105" x2="110" y2="55"/>
      <line x1="0" y1="105" x2="110" y2="110"/>
      <line x1="0" y1="105" x2="110" y2="165"/>
      <line x1="0" y1="105" x2="110" y2="210"/>
      <line x1="0" y1="180" x2="110" y2="0"/>
      <line x1="0" y1="180" x2="110" y2="55"/>
      <line x1="0" y1="180" x2="110" y2="110"/>
      <line x1="0" y1="180" x2="110" y2="165"/>
      <line x1="0" y1="180" x2="110" y2="210"/>
    </g>
    <g stroke="#00D4FF" stroke-width="1" fill="none" opacity="0.35">
      <line x1="110" y1="0" x2="220" y2="70"/>
      <line x1="110" y1="0" x2="220" y2="140"/>
      <line x1="110" y1="55" x2="220" y2="70"/>
      <line x1="110" y1="55" x2="220" y2="140"/>
      <line x1="110" y1="110" x2="220" y2="70"/>
      <line x1="110" y1="110" x2="220" y2="140"/>
      <line x1="110" y1="165" x2="220" y2="70"/>
      <line x1="110" y1="165" x2="220" y2="140"/>
      <line x1="110" y1="210" x2="220" y2="70"/>
      <line x1="110" y1="210" x2="220" y2="140"/>
    </g>

    <circle r="4" fill="#FFB347">
      <animateMotion dur="2.5s" repeatCount="indefinite" path="M 0 30 L 110 110 L 220 70"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#00D4FF">
      <animateMotion dur="3s" repeatCount="indefinite" begin="0.5s" path="M 0 180 L 110 55 L 220 140"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#FF6B9D">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="1s" path="M 0 105 L 110 165 L 220 70"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <g>
      <circle cx="0" cy="30" r="8" fill="#0a1128" stroke="#F75806" stroke-width="2"/>
      <circle cx="0" cy="30" r="3" fill="#F75806"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="0" cy="105" r="8" fill="#0a1128" stroke="#F75806" stroke-width="2"/>
      <circle cx="0" cy="105" r="3" fill="#F75806"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="0" cy="180" r="8" fill="#0a1128" stroke="#F75806" stroke-width="2"/>
      <circle cx="0" cy="180" r="3" fill="#F75806"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <circle cx="110" cy="0" r="7" fill="#0a1128" stroke="#FFB347" stroke-width="2"/>
      <circle cx="110" cy="0" r="2.5" fill="#FFB347"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="55" r="7" fill="#0a1128" stroke="#FFB347" stroke-width="2"/>
      <circle cx="110" cy="55" r="2.5" fill="#FFB347"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.2s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="110" r="7" fill="#0a1128" stroke="#FFB347" stroke-width="2"/>
      <circle cx="110" cy="110" r="2.5" fill="#FFB347"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="165" r="7" fill="#0a1128" stroke="#FFB347" stroke-width="2"/>
      <circle cx="110" cy="165" r="2.5" fill="#FFB347"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="210" r="7" fill="#0a1128" stroke="#FFB347" stroke-width="2"/>
      <circle cx="110" cy="210" r="2.5" fill="#FFB347"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.8s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <circle cx="220" cy="70" r="8" fill="#0a1128" stroke="#00D4FF" stroke-width="2"/>
      <circle cx="220" cy="70" r="3" fill="#00D4FF"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="220" cy="140" r="8" fill="#0a1128" stroke="#00D4FF" stroke-width="2"/>
      <circle cx="220" cy="140" r="3" fill="#00D4FF"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    </g>

    <g font-family="'Courier New', monospace" font-size="10" fill="#64748B" text-anchor="middle">
      <text x="0" y="240">INPUT</text>
      <text x="110" y="240">HIDDEN</text>
      <text x="220" y="240">OUTPUT</text>
    </g>
  </g>

  <!-- Right content -->
  <g transform="translate(440, 0)">
