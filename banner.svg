    <!-- Blinking cursor -->
    <rect x="920" y="150" width="14" height="50" fill="#F75806">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Role -->
    <rect x="0" y="225" width="6" height="38" fill="#F75806"/>
    <text x="20" y="253" font-family="'Helvetica Neue', sans-serif" font-size="26" font-weight="600" fill="#E8F0FF" letter-spacing="3">DATA &amp; AI ENGINEER</text>
    <text x="20" y="278" font-family="'Courier New', monospace" font-size="13" fill="#64748B" letter-spacing="1.5">◆ WORKFLOW AUTOMATION EXPERT</text>

    <!-- Skill pills -->
    <g font-family="'Helvetica Neue', sans-serif" font-size="12" font-weight="600">
      <!-- Row 1 — AI / LLM / Deep Learning -->
      <g transform="translate(0, 305)">
        <rect x="0" y="0" width="58" height="28" rx="14" fill="none" stroke="#F75806" stroke-width="1.5"/>
        <text x="29" y="18" fill="#F75806" text-anchor="middle" letter-spacing="1">LLM</text>

        <rect x="68" y="0" width="60" height="28" rx="14" fill="none" stroke="#FFB347" stroke-width="1.5"/>
        <text x="98" y="18" fill="#FFB347" text-anchor="middle" letter-spacing="1">RAG</text>

        <rect x="138" y="0" width="95" height="28" rx="14" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
        <text x="185.5" y="18" fill="#00D4FF" text-anchor="middle" letter-spacing="1">LANGCHAIN</text>

        <rect x="243" y="0" width="100" height="28" rx="14" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
        <text x="293" y="18" fill="#00D4FF" text-anchor="middle" letter-spacing="1">LANGGRAPH</text>

        <rect x="353" y="0" width="95" height="28" rx="14" fill="none" stroke="#FF6B9D" stroke-width="1.5"/>
        <text x="400.5" y="18" fill="#FF6B9D" text-anchor="middle" letter-spacing="1">AI AGENTS</text>

        <rect x="458" y="0" width="55" height="28" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
        <text x="485.5" y="18" fill="#8B5CF6" text-anchor="middle" letter-spacing="1">N8N</text>

        <rect x="523" y="0" width="55" height="28" rx="14" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
        <text x="550.5" y="18" fill="#00D4FF" text-anchor="middle" letter-spacing="1">NLP</text>

        <rect x="588" y="0" width="55" height="28" rx="14" fill="none" stroke="#FF6B9D" stroke-width="1.5"/>
        <text x="615.5" y="18" fill="#FF6B9D" text-anchor="middle" letter-spacing="1">CNN</text>

        <rect x="653" y="0" width="160" height="28" rx="14" fill="none" stroke="#F75806" stroke-width="1.5"/>
        <text x="733" y="18" fill="#F75806" text-anchor="middle" letter-spacing="1">TRANSFER LEARNING</text>
      </g>

      <!-- Row 2 — Data Engineering / Infra / Languages -->
      <g transform="translate(0, 343)">
        <rect x="0" y="0" width="58" height="28" rx="14" fill="none" stroke="#22C55E" stroke-width="1.5"/>
        <text x="29" y="18" fill="#22C55E" text-anchor="middle" letter-spacing="1">ETL</text>

        <rect x="68" y="0" width="130" height="28" rx="14" fill="none" stroke="#22C55E" stroke-width="1.5"/>
        <text x="133" y="18" fill="#22C55E" text-anchor="middle" letter-spacing="1">DATA PIPELINES</text>

        <rect x="208" y="0" width="85" height="28" rx="14" fill="none" stroke="#FFB347" stroke-width="1.5"/>
        <text x="250.5" y="18" fill="#FFB347" text-anchor="middle" letter-spacing="1">POWER BI</text>

        <rect x="303" y="0" width="65" height="28" rx="14" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
        <text x="335.5" y="18" fill="#00D4FF" text-anchor="middle" letter-spacing="1">CLOUD</text>

        <rect x="378" y="0" width="55" height="28" rx="14" fill="none" stroke="#FFB347" stroke-width="1.5"/>
        <text x="405.5" y="18" fill="#FFB347" text-anchor="middle" letter-spacing="1">AWS</text>

        <rect x="443" y="0" width="80" height="28" rx="14" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
        <text x="483" y="18" fill="#00D4FF" text-anchor="middle" letter-spacing="1">DOCKER</text>

        <rect x="533" y="0" width="85" height="28" rx="14" fill="none" stroke="#FF6B9D" stroke-width="1.5"/>
        <text x="575.5" y="18" fill="#FF6B9D" text-anchor="middle" letter-spacing="1">BIG DATA</text>

        <rect x="628" y="0" width="75" height="28" rx="14" fill="none" stroke="#FFB347" stroke-width="1.5"/>
        <text x="665.5" y="18" fill="#FFB347" text-anchor="middle" letter-spacing="1">PYTHON</text>

        <rect x="713" y="0" width="75" height="28" rx="14" fill="none" stroke="#E8F0FF" stroke-width="1.5"/>
        <text x="750.5" y="18" fill="#E8F0FF" text-anchor="middle" letter-spacing="1">NEXT.JS</text>
      </g>
    </g>

    <!-- Status line -->
    <g transform="translate(0, 410)" font-family="'Courier New', monospace" font-size="13">
      <circle cx="6" cy="5" r="4" fill="#22C55E">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="10" fill="#22C55E">AVAILABLE FOR HIRE</text>
      <text x="175" y="10" fill="#64748B">//</text>
      <text x="200" y="10" fill="#00D4FF">pankajpramanik.com</text>
      <text x="380" y="10" fill="#64748B">//</text>
      <text x="405" y="10" fill="#FFB347">BUILDING INTELLIGENT SYSTEMS</text>
    </g>
