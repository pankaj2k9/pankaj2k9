    <g font-family="'Courier New', 'Consolas', monospace" font-size="14">
      <text x="0" y="110" fill="#F75806" font-weight="bold">&gt;</text>
      <text x="14" y="110" fill="#64748B">whoami</text>
      <text x="100" y="110" fill="#00D4FF">--verbose</text>
    </g>

    <!-- Name -->
